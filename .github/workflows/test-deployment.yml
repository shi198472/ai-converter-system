name: Test Cloudflare Pages Deployment

on:
  workflow_dispatch:  # 仅手动触发

jobs:
  test-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Test API Token (without exposing it)
        run: |
          echo "Testing Cloudflare API Token..."
          echo "Token exists: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}"
          echo "Account ID exists: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}"
          
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN is not set"
            exit 1
          fi
          
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "❌ CLOUDFLARE_ACCOUNT_ID is not set"
            exit 1
          fi
          
          echo "✅ Secrets are configured"
      
      - name: Install dependencies
        working-directory: frontend
        run: |
          echo "Installing dependencies..."
          npm ci
      
      - name: Build project
        working-directory: frontend
        run: |
          echo "Building project..."
          npm run build
          echo "Build completed successfully"
      
      - name: List build output
        working-directory: frontend/dist
        run: |
          echo "Build output contents:"
          ls -la
          echo ""
          echo "Total files: $(find . -type f | wc -l)"
      
      - name: Create deployment files
        working-directory: frontend/dist
        run: |
          echo "Creating _redirects file..."
          echo "/* /index.html 200" > _redirects
          
          echo "Creating _headers file..."
          cat > _headers << 'EOF'
          /*
            X-Frame-Options: DENY
            X-Content-Type-Options: nosniff
            Referrer-Policy: strict-origin-when-cross-origin
          EOF
          
          echo "✅ Deployment files created"
      
      - name: Test Cloudflare API connection
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Testing Cloudflare API connection..."
          
          # 测试 Token 有效性
          RESPONSE=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify")
          
          echo "Token verification response:"
          echo $RESPONSE | jq -r '.success' && echo "✅ Token is valid" || echo "❌ Token verification failed"
          
          # 测试账户访问
          if [ "$(echo $RESPONSE | jq -r '.success')" = "true" ]; then
            echo "✅ Cloudflare API connection successful"
          else
            echo "❌ Cloudflare API connection failed"
            exit 1
          fi
      
      - name: Deployment readiness check
        run: |
          echo "✅ All checks passed!"
          echo ""
          echo "📋 Deployment Summary:"
          echo "======================"
          echo "• GitHub Secrets: ✅ Configured"
          echo "• Node.js: ✅ Version 18"
          echo "• Dependencies: ✅ Installed"
          echo "• Build: ✅ Successful"
          echo "• Cloudflare API: ✅ Connected"
          echo ""
          echo "🚀 Ready for deployment!"
          echo ""
          echo "Next steps:"
          echo "1. Run the 'Deploy to Cloudflare Pages' workflow"
          echo "2. Monitor deployment progress"
          echo "3. Visit: https://ai-converter-system.pages.dev"