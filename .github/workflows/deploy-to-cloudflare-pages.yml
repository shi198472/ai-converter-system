name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
    inputs:
      cloudflare_api_token:
        description: 'Cloudflare API Token'
        required: true
        type: string
      cloudflare_account_id:
        description: 'Cloudflare Account ID'
        required: true
        type: string
        default: '907dc1ca42c6f0e75b5ea92bb02c8aa6'
      project_name:
        description: 'Project Name'
        required: false
        type: string
        default: 'ai-converter-system'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: frontend
        run: |
          npm ci
          echo "Dependencies installed successfully"
      
      - name: Build project
        working-directory: frontend
        run: |
          npm run build
          echo "Build completed"
        env:
          CI: false
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:3001' }}
      
      - name: Create _redirects file
        working-directory: frontend/dist
        run: |
          echo "/* /index.html 200" > _redirects
          echo "_redirects file created"
      
      - name: Create _headers file
        working-directory: frontend/dist
        run: |
          cat > _headers << 'EOF'
          /*
            X-Frame-Options: DENY
            X-Content-Type-Options: nosniff
            Referrer-Policy: strict-origin-when-cross-origin
            Permissions-Policy: camera=(), microphone=(), geolocation=()
            Cache-Control: public, max-age=3600
          EOF
          echo "_headers file created"
      
      - name: List build output
        working-directory: frontend/dist
        run: |
          ls -la
          echo "Total files: $(find . -type f | wc -l)"
      
      - name: Publish to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ github.event.inputs.cloudflare_api_token }}
          accountId: ${{ github.event.inputs.cloudflare_account_id }}
          projectName: ${{ github.event.inputs.project_name }}
          directory: 'frontend/dist'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          wranglerVersion: '3'
      
      - name: Deployment status
        run: |
          echo "Deployment URL: ${{ steps.deploy.outputs.url }}"
          echo "Deployment ID: ${{ steps.deploy.outputs.id }}"
          echo "Deployment environment: ${{ steps.deploy.outputs.environment }}"
          echo "Deployment alias: ${{ steps.deploy.outputs.alias }}"
      
      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Preview URL: ${{ steps.deploy.outputs.url }}"
      
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs above for details."